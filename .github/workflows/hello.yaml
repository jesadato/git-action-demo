  name: Hello World
  on: 
    push:
      branches: [main]
      paths-ignore:
        - ".github/workflows/*"
    pull_request:
      branches: [main]
      
    repository_dispatch:
      types: ["on-demand-test"]
      
  jobs:
    echo-vars:
      runs-on: ubuntu-latest
      steps:
        - name: Echo Github Variable


          

    hello-job:
      runs-on: ubuntu-latest
      steps:
        - name: Run a one-line script
          run : echo "Hello Github Actions!"
          
        - name: Retrieve client payload
          run : echo "Client sent status ${{github.event.client_payload.status}}"
          run : echo "Client sent status ${{github.event_name}}"
          
    seccond-job:
      runs-on: windows-latest
      needs: hello-job
      steps:
        - run: echo "This job is running on ${{runner.os}}"
