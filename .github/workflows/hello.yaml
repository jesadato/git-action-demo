  name: Hello World
  on: 
    push:
      branches: [main]
      paths-ignore:
        - ".github/*"
    pull_request:
      branches: [main]
      
    repository_dispatch:
      types: ["on-demand-test"]
      
  jobs:
    echo-vars:
      env:
        PACKAGE_PATH : '.'
      runs-on: ubuntu-latest
      steps:
        - name: Echo Github Variable
          env:
            APP_VERSION : "2.34.5"
          run : |
            echo "This job trigger by ${{github.event_name}}";
            echo "This repository is ${{github.repository}}";
            echo "This branch is ${{github.ref_name}}";
            echo "This is a ${{env.APP_VERSION}} version  ${{env.APP_VERSION}} ";
            echo "$RUNNER_CONTEXT"
          

    hello-job:
      runs-on: ubuntu-latest
      steps:
        - name: Run a one-line script
          run : echo "Hello Github Actions!"
          
        - name: Retrieve client payload
          run : echo "Client sent status ${{github.event.client_payload.status}}"

          
    seccond-job:
      runs-on: windows-latest
      needs: hello-job
      steps:
        - run: echo "This job is running on ${{runner.os}}"
